<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/public/shopflow-favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopFlow</title>
  <link rel="stylesheet" type="text/css" href="/loader.css" />
</head>

<body>
  <div id="app">
    <div id="loading-bg">
      <div class="loading-logo">
        <!-- SVG Logo -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64">
          <defs>
            <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#38BDF8" />
              <stop offset="100%" style="stop-color:#0369A1;stop-opacity:0.6" />
            </linearGradient>
            <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#60A5FA" />
              <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0.6" />
            </linearGradient>
            <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#818CF8" />
              <stop offset="100%" style="stop-color:#4338CA;stop-opacity:0.6" />
            </linearGradient>
            <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#A78BFA" />
              <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:0.6" />
            </linearGradient>
            <linearGradient id="lineG" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#38BDF8" />
              <stop offset="100%" style="stop-color:#A78BFA" />
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="1" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <!-- Background -->
          <rect x="0" y="0" width="32" height="32" rx="7" fill="#0F172A" />

          <!-- Subtle grid -->
          <line x1="0" y1="10" x2="32" y2="10" stroke="white" stroke-width="0.4" opacity="0.06" />
          <line x1="0" y1="18" x2="32" y2="18" stroke="white" stroke-width="0.4" opacity="0.06" />
          <line x1="0" y1="26" x2="32" y2="26" stroke="white" stroke-width="0.4" opacity="0.06" />

          <!-- Bars -->
          <rect x="3" y="22" width="5" height="7" rx="1.5" fill="url(#bar1)" opacity="0.9" />
          <rect x="10" y="16" width="5" height="13" rx="1.5" fill="url(#bar2)" opacity="0.9" />
          <rect x="17" y="10" width="5" height="19" rx="1.5" fill="url(#bar3)" opacity="0.9" />
          <rect x="24" y="4" width="5" height="25" rx="1.5" fill="url(#bar4)" opacity="0.9" />

          <!-- Trend line -->
          <polyline points="5.5,20 12.5,14 19.5,8 26.5,2" fill="none" stroke="url(#lineG)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

          <!-- Dots -->
          <circle cx="5.5" cy="20" r="1.5" fill="#38BDF8" filter="url(#glow)" />
          <circle cx="12.5" cy="14" r="1.5" fill="#60A5FA" filter="url(#glow)" />
          <circle cx="19.5" cy="8" r="1.5" fill="#818CF8" filter="url(#glow)" />
          <circle cx="26.5" cy="2" r="2" fill="#A78BFA" filter="url(#glow)" />

          <!-- Top dot pulse ring -->
          <circle cx="26.5" cy="2" r="4" fill="none" stroke="#A78BFA" stroke-width="0.8" opacity="0.35" />
        </svg>
      </div>

      <div class="loading">
        <div class="effect-1 effects"></div>
        <div class="effect-2 effects"></div>
        <div class="effect-3 effects"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>

  <script>
    // ShopFlow — loader theme detection
    const savedTheme = localStorage.getItem('vuexy-theme') // 'light' | 'dark' | 'system'
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches

    const isDark =
      savedTheme === 'dark' ||
      (savedTheme === 'system' && prefersDark) ||
      (!savedTheme && prefersDark)

    const loaderBg = isDark
      ? (localStorage.getItem('vuexy-initial-loader-bg') || '#080D18')
      : (localStorage.getItem('vuexy-initial-loader-bg') || '#F8FAFF')

    const primaryColor = localStorage.getItem('vuexy-initial-loader-color') || '#0EA5E9'

    document.documentElement.style.setProperty('--initial-loader-bg', loaderBg)
    document.documentElement.style.setProperty('--initial-loader-color', primaryColor)

    const loadingBg = document.getElementById('loading-bg')
    if (loadingBg) loadingBg.style.background = loaderBg
  </script>
</body>

</html>
