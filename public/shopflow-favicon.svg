<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="lineG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#0F172A"/>

  <!-- Bars -->
  <rect x="3"  y="22" width="5" height="7"  rx="1.5" fill="url(#bar1)"/>
  <rect x="10" y="16" width="5" height="13" rx="1.5" fill="url(#bar2)"/>
  <rect x="17" y="10" width="5" height="19" rx="1.5" fill="url(#bar3)"/>
  <rect x="24" y="4"  width="5" height="25" rx="1.5" fill="url(#bar4)"/>

  <!-- Trend line -->
  <polyline
    points="5.5,20  12.5,14  19.5,8  26.5,2"
    fill="none"
    stroke="url(#lineG)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Dots -->
  <circle cx="5.5"  cy="20" r="1.5" fill="white"/>
  <circle cx="12.5" cy="14" r="1.5" fill="white"/>
  <circle cx="19.5" cy="8"  r="1.5" fill="white"/>
  <circle cx="26.5" cy="2"  r="2"   fill="white"/>
</svg>
