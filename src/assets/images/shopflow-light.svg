  <text x="104" y="60" font-family="'Trebuchet MS','Gill Sans',sans-serif" font-size="42" font-weight="800" letter-spacing="-2" fill="url(#textGrad)">Shop</text>
  <text x="222" y="60" font-family="'Trebuchet MS','Gill Sans',sans-serif" font-size="42" font-weight="300" letter-spacing="-2" fill="#334155">Flow</text>
