<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="240" height="72">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#4338CA;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1525"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="4" y="4" width="82" height="82" rx="16"/>
    </clipPath>
  </defs>

  <!-- Icon background -->
  <rect x="4" y="4" width="82" height="82" rx="16" fill="url(#bgGrad)"/>
  <rect x="4" y="4" width="82" height="82" rx="16" fill="none" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.5"/>

  <!-- Subtle grid -->
  <g clip-path="url(#iconClip)" opacity="0.07">
    <line x1="4" y1="28" x2="86" y2="28" stroke="white" stroke-width="1"/>
    <line x1="4" y1="48" x2="86" y2="48" stroke="white" stroke-width="1"/>
    <line x1="4" y1="68" x2="86" y2="68" stroke="white" stroke-width="1"/>
  </g>

  <!-- Base line -->
  <line x1="12" y1="76" x2="78" y2="76" stroke="#334155" stroke-width="1.2" clip-path="url(#iconClip)"/>

  <!-- Bar 1 (shortest) -->
  <rect x="14" y="60" width="11" height="16" rx="3" fill="url(#bar1)" clip-path="url(#iconClip)" opacity="0.9"/>

  <!-- Bar 2 -->
  <rect x="29" y="48" width="11" height="28" rx="3" fill="url(#bar2)" clip-path="url(#iconClip)" opacity="0.9"/>

  <!-- Bar 3 -->
  <rect x="44" y="34" width="11" height="42" rx="3" fill="url(#bar3)" clip-path="url(#iconClip)" opacity="0.9"/>

  <!-- Bar 4 (tallest) -->
  <rect x="59" y="18" width="11" height="58" rx="3" fill="url(#bar4)" clip-path="url(#iconClip)" opacity="0.9"/>

  <!-- Rising trend line on top of bars -->
  <polyline
    points="19,58 34,46 49,32 64,16"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    clip-path="url(#iconClip)"/>

  <!-- Dots on trend line -->
  <circle cx="19" cy="58" r="2.8" fill="#38BDF8" filter="url(#glow)"/>
  <circle cx="34" cy="46" r="2.8" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="49" cy="32" r="2.8" fill="#818CF8" filter="url(#glow)"/>
  <circle cx="64" cy="16" r="3.5" fill="#A78BFA" filter="url(#softglow)"/>

  <!-- Top dot pulse ring -->
  <circle cx="64" cy="16" r="7" fill="none" stroke="#A78BFA" stroke-width="1.2" opacity="0.4" clip-path="url(#iconClip)"/>

  <!-- Wordmark "Shop" -->
  <text x="104" y="60"
        font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
        font-size="42"
        font-weight="800"
        letter-spacing="-2"
        fill="url(#textGrad)">Shop</text>

  <!-- Wordmark "Flow" -->
  <text x="222" y="60"
        font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
        font-size="42"
        font-weight="300"
        letter-spacing="-2"
        fill="#1E293B">Flow</text>

  <!-- Underline accent -->
  <path d="M104 72 Q200 80 322 68"
        fill="none"
        stroke="url(#textGrad)"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.45"/>
</svg>
